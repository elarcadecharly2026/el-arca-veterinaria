<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: monospace; }
</style>
</head>
<body onload="window.print()">

<div style="margin-bottom: 20px; display: flex; gap: 10px;" class="no-print">
    <button onclick="window.print()" style="padding: 10px;">🖨️ Imprimir</button>
    <a href="/ventas/nueva" style="padding: 10px; background: #eee; text-decoration: none; color: black; border: 1px solid #ccc;">🛒 Nueva Venta</a>
</div>

<style>
@media print {
    .no-print { display: none; }
}
</style>

<h3>🧾 Ticket</h3>
<p>Venta #{{ sale.id }}</p>

<hr>

{% for i in items %}
<p>{{ i.product.name }} x{{ i.qty }} - ${{ i.price }}</p>
{% endfor %}

<hr>

<h2>Total: ${{ sale.total }}</h2>

</body>
</html>
