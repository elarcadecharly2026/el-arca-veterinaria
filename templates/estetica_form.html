{% extends "base.html" %}
{% block content %}

<div class="estetica-layout">
  <div class="panel-form-estetica">
    <div class="form-header">
      <span></span>
      <h2>{{ titulo }}</h2>
    </div>

    <form method="POST" action="{{ url_for('esteticaform_servicio', servicio=servicio) }}">
      <div class="fila">
        <label>Fecha:</label>
        <input type="date" name="fecha">
      </div>

      <h3>Datos del propietario</h3>
      <div class="grid-2">
        <div>
          <label>Nombre:</label><input type="text" name="propietarionombre">
          <label>Dirección:</label><input type="text" name="propietariodireccion">
          <label>Número:</label>
          <input type="tel" name="propietarionumero" id="telefono" maxlength="10" pattern="[0-9]{10}" 
           title="Solo 10 dígitos numéricos" required placeholder="9981234567">
        </div>
      </div>

      <h3>Datos de la mascota</h3>
      <div class="grid-2">
        <div style="padding-bottom: 1%" >
          <label>Nombre:</label><input type="text" name="mascotanombre">
          <label>Sexo:</label>
          <select name="mascotasexo" required>
            <option value="">Seleccionar</option>
            <option value="masculino">Hembra</option>
            <option value="femenino">Macho</option>
          </select>
          <label>Edad:</label>
          <input type="text" name="mascotaedad" id="edad" maxlength="2" pattern="^(0[1-9]|[1-8][0-9]|9[0-9])$" 
           title="Edad de 01 a 99" required placeholder="05">
        </div>
        <div>
          <label>Raza:</label><input type="text" name="mascotaraza">
          <label>Color:</label><input type="text" name="mascotacolor">
          <label>Tamaño (cm):</label>
          <input type="number" name="mascotatamano" id="tamano" min="1" max="300" step="0.1" 
           title="Tamaño en centímetros" required placeholder="25.5">
        </div>
      </div>

      {% if servicio == 'cortepelo' %}
      <div>
        <label>Tipo de corte:</label>
        <select name="tipocorte" required>
          <option value="">Seleccionar tipo</option>
          <option value="estandar">Estándar</option>
          <option value="artistica">Artística</option>
          <option value="deportiva">Deportiva</option>
          <option value="navidad">Navidad</option>
          <option value="halloween">Halloween</option>
          <option value="personalizado">Personalizado</option>
        </select>
      </div>
      {% endif %}

      <h3>Observaciones</h3>
      <textarea name="observaciones" rows="4"></textarea>

      <h3>Precio</h3>

      <div class="precios" style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button type="button" class="btn-servicio" onclick="agregarServicio('{{ titulo }}', 300)">$300</button>
        <button type="button" class="btn-servicio" onclick="agregarServicio('{{ titulo }}', 350)">$350</button>
        <button type="button" class="btn-servicio" onclick="agregarServicio('{{ titulo }}', 400)">$400</button>
        <button type="button" class="btn-servicio" onclick="agregarServicio('{{ titulo }}', 500)">$500</button>
        <button type="button" class="btn-servicio" onclick="agregarServicio('{{ titulo }}', 550)">$550</button>
        
        <div style="display: flex; align-items: center; gap: 10px; margin: 10px;">
          <input type="number" id="precio_manual" placeholder="Precio manual" style="width: 120px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
          <button type="button" class="btn-servicio" style="margin: 0; padding: 10px 20px;" onclick="const p = document.getElementById('precio_manual').value; if(p > 0) agregarServicio('{{ titulo }} (Manual)', p); else alert('Ingresa un precio válido');">➕ Añadir</button>
        </div>
      </div>

      <h3>Servicios seleccionados</h3>

      <table class="table">
        <thead>
          <tr>
            <th>Servicio</th>
            <th>Precio</th>
            <th>Eliminar</th>
          </tr>
        </thead>
        <tbody id="tablaServicios"></tbody>
      </table>

      <!-- 🔥 TOTAL VISIBLE -->
      <h3>Total: $<span id="total-texto">0</span></h3>

      <input type="hidden" name="precio" id="precio-total">
      <input type="hidden" name="servicio" id="servicio-input">

      <div style="margin-top:20px;">
        <button type="submit" class="btn btn-primary">Guardar servicio</button>
      </div>

<script>
let total = 0;

function agregarServicio(nombre, precio) {
    const tabla = document.getElementById("tablaServicios");

    let fila = document.createElement("tr");

    fila.innerHTML = `
        <td>${nombre}</td>
        <td><input type="number" value="${precio}" onchange="actualizarTotal()"></td>
        <td><button type="button" onclick="eliminarFila(this)">X</button></td>
    `;

    tabla.appendChild(fila);

    actualizarTotal();
}

function eliminarFila(btn) {
    btn.parentElement.parentElement.remove();
    actualizarTotal();
}

function actualizarTotal() {
    total = 0;
    const filas = document.querySelectorAll("#tablaServicios tr");

    filas.forEach(fila => {
        const precio = fila.querySelector("input").value;
        total += parseFloat(precio) || 0;
    });

    document.getElementById("precio-total").value = total;
    document.getElementById("servicio-input").value = "SERVICIO ESTÉTICA";
    document.getElementById("total-texto").innerText = total.toFixed(2);
}

// 🔥 VALIDACIÓN
document.querySelector("form").addEventListener("submit", function(e) {
    if (total <= 0) {
        alert("Debes agregar al menos un servicio");
        e.preventDefault();
    }
});
</script>
          
<style>
.content{background-image: linear-gradient(to top, #a8edea 0%, #fed6e3 100%);}

.btn-servicio {
  background-image: linear-gradient(to right, #77A1D3 0%, #79CBCA 51%, #77A1D3 100%);
  margin: 10px;
  padding: 15px 45px;
  text-align: center;
  text-transform: uppercase;
  transition: 0.5s;
  background-size: 200% auto;
  color: white;
  box-shadow: 0 0 20px #eee;
  border-radius: 10px;
  display: inline-block;
  outline: none;
  border: none;
}

.btn-servicio:hover,
.btn-servicio.active {
  background-position: right center !important;
  color: #fff !important;
  text-decoration: none !important;
}

/* 🔥 tabla más bonita */
table {
  width: 100%;
  margin-top: 10px;
}

table input {
  width: 80px;
  text-align: center;
}
</style>

    </form>
  </div>
</div>

{% endblock %}
