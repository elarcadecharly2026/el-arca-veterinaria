{% extends "base.html" %}
{% block content %}
<h2>{{ 'Editar' if item else 'Nuevo' }} producto</h2>

<form method="post" class="form" enctype="multipart/form-data">

    <label>Código</label>
    <input name="code" value="{{ item.code if item else '' }}">

    <label>Nombre</label>
    <input name="name" value="{{ item.name if item else '' }}" required>

    <label>Categoría</label>
    <input name="category" value="{{ item.category if item else '' }}">

    <label for="caducidad">Caducidad</label>
    <input type="date" id="caducidad" name="caducidad"
    value="{{ item.caducidad.isoformat() if item and item.caducidad else '' }}">

    <!--  PRECIOS -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
        
        <div>
            <label> Precio de compra</label>
            <input name="cost_price" type="number" step="0.01"
            value="{{ item.cost_price if item else '0' }}">
        </div>

        <div>
            <label> Precio por unidad</label>
            <input name="price" type="number" step="0.01"
            value="{{ item.price if item else '0' }}">
        </div>

    </div>

    <label>Cantidad</label>
    <input name="quantity" type="number" step="1"
    value="{{ item.quantity if item else '0' }}">

    <label>Notas</label>
    <textarea name="notes">{{ item.notes if item else '' }}</textarea>
    
    <!-- Imagen -->
    <label>Imagen del producto:</label>
    <input type="file" id="productImage" name="image"
    accept="image/*,.png,.jpg,.jpeg,.gif" capture="environment">

    <img id="imagePreview" class="img-preview"
    style="max-width: 200px; max-height: 200px; display: none; margin-top: 10px;">

    <button>Guardar</button>
</form>

<script>
document.getElementById('productImage').addEventListener('change', function(e) {
  const preview = document.getElementById('imagePreview');
  const file = e.target.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  }
});
</script>

<style>
.img-preview {
    border: 1px solid #ccc;
    border-radius: 5px;
}
</style>

{% endblock %}
