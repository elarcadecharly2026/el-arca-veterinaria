{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<div class="servicios-grid">
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='banos') }}">BAÑOS</a>
<a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='banomedicado') }}">BAÑO MEDICADO</a>
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='cortepelo') }}">CORTE DE PELO</a>
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='deslanado') }}">DESLANADO</a>
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='banodermatologico') }}">BAÑO DERMATOLÓGICO</a>
  <a class="btn-estetica btn-estetica--full" href="{{ url_for('esteticaform_servicio', servicio='extras') }}">EXTRAS</a>
</div>


<style>
.estetica-layout {
  display: flex;
}

.estetica-layout .panel-estetica {
  flex: 1;
  padding: 2rem 1rem;
  display: grid;
  grid-template-columns: repeat(3, minmax(180px, 1fr));
  grid-gap: 1.5rem;
  justify-items: center;
}

.btn-estetica {
  background-image: linear-gradient(to right, #504b8a 0%, #3b82f633 51%, #3b82f678 100%);
  font-weight: bold;
  font-size: 18px; /* 🔥 letra más grande */
  margin: 10px;
  padding: 18px 20px;
  text-align: center;
  text-transform: uppercase;
  transition: 0.5s;
  background-size: 200% auto;
  color: white;
  box-shadow: 0 0 20px #eee;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 260px;  
  height: 70px;  
}

.btn-estetica:hover {
  background-position: right center !important;
  color: #fff !important;
  text-decoration: none !important;
}

.btn-estetica--full {
  grid-column: 1 / -1;
  max-width: 340px;
}

.servicios-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  justify-items: center;
}

/* 🔥 corrección importante */
.servicios-grid a:nth-child(6) {
  grid-column: 2 / 3;
}

/* Responsive */
@media (max-width: 900px) {
  .servicios-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .servicios-grid {
    grid-template-columns: 1fr;
  }

  .btn-estetica {
    width: 100%;
  }
}
</style>
