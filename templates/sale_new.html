{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">🛒 Nueva Venta</h2>

<style>
input, select, button {
    padding: 8px;
    margin: 5px 0;
}

#resultados div {
    padding: 5px;
    cursor: pointer;
    border-bottom: 1px solid #ddd;
}
#resultados div:hover {
    background: #f0f0f0;
}

.table {
    width: 100%;
    border-collapse: collapse;
}
.table th, .table td {
    border: 1px solid #ddd;
    padding: 8px;
}
</style>

<!-- 🔎 BUSCADOR -->
<input type="text" id="buscador" placeholder="🔎 Buscar producto..." style="width:100%;">
<div id="resultados"></div>

<form method="POST">

    <input type="text" name="code" placeholder="Código producto" required>
    <input type="number" name="qty" value="1" step="0.1">

    <button type="submit">➕ Agregar</button>

    <br><br>

    <!-- 💳 MÉTODO DE PAGO -->
    <label>Método de pago:</label>
    <select name="metodo_pago">
        <option value="efectivo">💵 Efectivo</option>
        <option value="tarjeta">💳 Tarjeta</option>
    </select>

    <br><br>

    <button type="submit" onclick="sonido()">💰 Finalizar venta</button>

</form>

<hr>

<h3>🧾 Productos</h3>

<table class="table">
<tr>
    <th>Producto</th>
    <th>Cantidad</th>
    <th>Precio</th>
</tr>

{% for i in items %}
<tr>
    <td>{{ i.product.name }}</td>
    <td>{{ i.qty }}</td>
    <td>${{ i.price }}</td>
</tr>
{% endfor %}

</table>

<h3>Total: ${{ total }}</h3>

<!-- 🔔 SONIDO -->
<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
function sonido(){
    document.getElementById("sound").play();
}
</script>

<!-- 🔎 BUSCADOR JS -->
<script>
const buscador = document.getElementById("buscador");
const resultados = document.getElementById("resultados");

buscador.addEventListener("input", async () => {
    const q = buscador.value;

    if(q.length < 2){
        resultados.innerHTML = "";
        return;
    }

    try {
        const res = await fetch(`/api/productos?q=${q}`);
        const data = await res.json();

        resultados.innerHTML = data.map(p => `
            <div onclick="selectProducto('${p.code}')">
                ${p.name} - $${p.price}
            </div>
        `).join('');
    } catch (e) {
        console.error("Error buscando productos", e);
    }
});

function selectProducto(code){
    document.querySelector("input[name='code']").value = code;
    resultados.innerHTML = "";
}
</script>

{% endblock %}
